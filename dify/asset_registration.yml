        model:
          completion_params:
            temperature: 0
          mode: chat
          name: google/gemini-2.5-flash-lite
          provider: langgenius/openrouter/openrouter
        prompt_template:
        - id: 64c70eed-22ee-4a16-91a2-a0f884205213
          role: system
          text: "وظیفه: استخراج دارایی‌های کاربر و بازگرداندن یک JSON خالص.\n\nهمیشه\
            \ فقط یک JSON معتبر برگردان — هیچ متن اضافه‌ای قبل یا بعد از آن نباشد:\n\
            {\"status\":\"ready\"|\"ask\",\"reply\":\"پیام فارسی\",\"assets\":[...]}\n\
            \nقوانین:\n۱) اگر کاربر دارایی با مقدار و قیمت کامل داد → status=\"ready\"\
            \ و assets را پر کن.\n۲) اگر اطلاعات ناقص بود → status=\"ask\" و در reply\
            \ فقط همان اطلاعات ناقص را بپرس.\n۳) در اولین پیام گفتگو، reply را با یک\
            \ معرفی کوتاه و دوستانه شروع کن؛ در پیام‌های بعدی هرگز سلام تکرار نکن.\n\
            ۴) اگر کاربر سؤال غیر مرتبط پرسید → status=\"ask\" و در reply راهنمایی\
            \ کن که دارایی‌هایش را بنویسد.\n\nساختار هر دارایی:\n{\"kind\":\"crypto\"\
            |\"gold18\"|\"gold24\"|\"gold_coin\"|\"tether\"|\"paper_dollar\"|\"other\"\
            ,\"symbol\":\"نماد (فقط crypto مثل BTC)\",\"name\":\"نام نمایشی\",\"amount\"\
            :عدد,\"buy_value\":عدد,\"buy_currency\":\"toman\"|\"usd\",\"buy_basis\"\
            :\"per_unit\"|\"total\"}\n\nنکته: اگر کاربر «مبلغ کل» گفت → amount=کل÷قیمت_واحد\
            \ و buy_basis=\"per_unit\".\n\nمثال ۱:\nورودی: «۱۰ تتر روی ۱۷۰ هزار تومن\
            \ خریدم»\nخروجی: {\"status\":\"ready\",\"reply\":\"ثبت شد ✅ ۱۰ تتر با قیمت\
            \ خرید ۱۷۰٬۰۰۰ تومان.\",\"assets\":[{\"kind\":\"tether\",\"symbol\":\"\
            USDT\",\"name\":\"تتر\",\"amount\":10,\"buy_value\":170000,\"buy_currency\"\
            :\"toman\",\"buy_basis\":\"per_unit\"}]}\n\nمثال ۲:\nورودی: «۱۰ گرم طلای\
            \ ۱۸ عیار روی ۱۶ میلیون تومان»\nخروجی: {\"status\":\"ready\",\"reply\"\
            :\"ثبت شد ✅ ۱۰ گرم طلای ۱۸ عیار با قیمت ۱۶٬۰۰۰٬۰۰۰ تومان.\",\"assets\"\
            :[{\"kind\":\"gold18\",\"name\":\"طلای ۱۸ عیار\",\"amount\":10,\"buy_value\"\
            :16000000,\"buy_currency\":\"toman\",\"buy_basis\":\"per_unit\"}]}\n\nمثال\
            \ ۳:\nورودی: «۱۰ دلار STG روی ۰.۱۶۲۲»\nخروجی: {\"status\":\"ready\",\"\
            reply\":\"ثبت شد ✅ حدود ۶۱.۶۵ واحد STG با قیمت ۰.۱۶۲۲ دلار.\",\"assets\"\
            :[{\"kind\":\"crypto\",\"symbol\":\"STG\",\"name\":\"Stargate\",\"amount\"\
            :61.65,\"buy_value\":0.1622,\"buy_currency\":\"usd\",\"buy_basis\":\"per_unit\"\
            }]}\n\nهیچ‌چیز غیر از JSON خالص برنگردان."
        - id: 43352307-7ea5-4fda-af7b-643d9311c125
