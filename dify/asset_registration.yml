    - data:
        code: "\nimport json\n\ndef to_num(x):\n    if x is None: return None\n  \
          \  s = str(x).replace(',', '').replace(' ', '').replace('\\u066c', '').strip()\n\
          \    trans = str.maketrans('\\u06f0\\u06f1\\u06f2\\u06f3\\u06f4\\u06f5\\\
          u06f6\\u06f7\\u06f8\\u06f9\\u0660\\u0661\\u0662\\u0663\\u0664\\u0665\\u0666\\\
          u0667\\u0668\\u0669', '01234567890123456789')\n    s = s.translate(trans)\n\
          \    try: return float(s)\n    except: return None\n\ndef main(llm_text:\
          \ str) -> dict:\n    raw = (llm_text or '').strip()\n    if raw.startswith('```'):\n\
          \        raw = raw.strip('`')\n        if raw[:4].lower() == 'json':\n \
          \           raw = raw[4:]\n    obj = {}\n    try:\n        obj = json.loads(raw)\n\
          \    except Exception:\n        a, b = raw.find('{'), raw.rfind('}')\n \
          \       if a != -1 and b != -1:\n            try: obj = json.loads(raw[a:b+1])\n\
          \            except Exception: obj = {}\n    status = (obj.get('status')\
          \ or 'ask').lower()\n    if status not in ('ready', 'ask'): status = 'ask'\n\
          \    assets = obj.get('assets') or []\n    if isinstance(assets, dict):\
          \ assets = assets.get('assets', [])\n    reply = obj.get('reply') or 'سلام\
          \ و وقت بخیر. من دستیار هوشمند «کریپتو اسمارت» هستم؛ لطفاً دارایی‌های خود\
          \ را همراه با قیمت خرید بنویسید.'\n    if not assets: status = 'ask'\n\n\
          \    # build a clean ordered list (markdown table) of the user's assets\n\
          \    ccy_map = {'toman': 'تومان', 'usd': 'دلار', 'dollar': 'دلار'}\n   \
          \ basis_map = {'per_unit': 'هر واحد', 'total': 'کل'}\n    md = \"| # | دارایی\
          \ | مقدار | قیمت خرید | واحد قیمت | مبنا |\\n\"\n    md += \"|---|---|---|---|---|---|\\\
          n\"\n    for i, a in enumerate(assets, 1):\n        name = a.get('name')\
          \ or 'دارایی'\n        amount = to_num(a.get('amount'))\n        amount_s\
          \ = f\"{amount:g}\" if amount is not None else \"—\"\n        bv = to_num(a.get('buy_value'))\n\
          \        bv_s = f\"{bv:,.0f}\" if bv is not None else \"—\"\n        ccy\
          \ = ccy_map.get((a.get('buy_currency') or '').lower(), '—')\n        basis\
          \ = basis_map.get((a.get('buy_basis') or '').lower(), '—')\n        md +=\
          \ f\"| {i} | {name} | {amount_s} | {bv_s} | {ccy} | {basis} |\\n\"\n\n \
          \   return {\"status\": status,\n            \"assets_json\": json.dumps(assets,\
          \ ensure_ascii=False),\n            \"reply\": reply,\n            \"list_md\"\
          : md}\n"
        code_language: python3
        desc: ''
        outputs:
          assets_json:
            type: string
          list_md:
            type: string
          reply:
            type: string
          status:
            type: string
        selected: false
        title: استخراج و ساخت لیست مرتب
        type: code
        variables:
