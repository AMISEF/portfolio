    opening_statement: 'سلام و وقت بخیر 👋

      من دستیار هوشمند «کریپتو اسمارت» هستم. کافیست دارایی‌هایتان را همراه با قیمت
      خرید بنویسید تا آن‌ها را برایتان به‌صورت یک لیست مرتب ثبت و ارائه کنم.


      مثال:

      «۱۰۰۰ تتر روی ۸۰ هزار تومان خریدم، ۱۰۰ گرم طلای ۱۸ عیار روی ۴۰ میلیون، ۰.۰۸
      بیت‌کوین روی ۸۰ هزار دلار.»'
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - ۵۰۰ تتر روی ۷۵ هزار تومان و ۲۰ گرم طلای ۱۸ عیار روی ۳ میلیون و ۸۰۰ هزار هر گرم
      خریدم
    - ۰.۵ اتریوم روی ۲۵۰۰ دلار دارم
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
