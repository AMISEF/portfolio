app:
  description: 'دستیار رسمی «کریپتو اسمارت»: کاربر دارایی‌هایش را می‌نویسد، ربات با
    او گفتگوی رسمی می‌کند، در صورت نبود قیمت خرید می‌پرسد و دارایی‌ها را به‌صورت لیست
    مرتب ارائه می‌دهد (محاسبه‌ی قیمت بر عهده‌ی سامانه است).'
  icon: 💰
  icon_background: '#1E293B'
  icon_type: emoji
  mode: advanced-chat
  name: کریپتو اسمارت | ثبت سبد دارایی
  use_icon_as_answer_icon: true
