{% set items = [
  ('portfolio', 'پورتفولیو', '<path d="M3 13h7V3H3zM14 21h7V11h-7zM14 3v5h7V3zM3 17v4h7v-4z" fill="currentColor"/>'),
  ('journal', 'ژورنال', '<path d="M4 4h13a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2z"/><path d="M8 8h7M8 12h7M8 16h4"/>'),
  ('settings', 'تنظیمات', '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a8 8 0 0 0 .1-3l1.6-1.2-1.5-2.6-1.9.6a8 8 0 0 0-2.6-1.5L14.4 4h-3l-.4 1.8a8 8 0 0 0-2.6 1.5l-1.9-.6L4.5 9.3 6.1 10.8a8 8 0 0 0 0 3l-1.6 1.2 1.5 2.6 1.9-.6a8 8 0 0 0 2.6 1.5l.4 1.8h3l.4-1.8a8 8 0 0 0 2.6-1.5l1.9.6 1.5-2.6z"/>')
] %}
{% set home_svg = '<path d="M3 11l9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/>' %}

<!-- موبایل: نوار پایین (خانه در وسط) -->
<nav class="nav nav--bottom">
  <div class="nav__bar">
    <button class="nav__item" data-nav="portfolio" title="پورتفولیو" aria-label="پورتفولیو"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ items[0][2]|safe }}</svg></button>
    <button class="nav__item" data-nav="journal" title="ژورنال" aria-label="ژورنال"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ items[1][2]|safe }}</svg></button>
    <button class="nav__item nav__item--home {% if active=='home' %}is-active{% endif %}" data-nav="home" title="خانه" aria-label="خانه"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">{{ home_svg|safe }}</svg></button>
    <button class="nav__item" data-nav="settings" title="تنظیمات" aria-label="تنظیمات"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ items[2][2]|safe }}</svg></button>
  </div>
</nav>

<!-- دسکتاپ: نوار عمودی سمت راست -->
<nav class="nav nav--side">
  <img class="nav__logo" src="/static/img/logo.svg" alt="CryptoSmart" onerror="this.src='/static/img/logo.png'">
  <button class="nav__item nav__item--home {% if active=='home' %}is-active{% endif %}" data-nav="home" title="خانه" aria-label="خانه"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">{{ home_svg|safe }}</svg></button>
  <button class="nav__item" data-nav="portfolio" title="پورتفولیو" aria-label="پورتفولیو"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ items[0][2]|safe }}</svg></button>
  <button class="nav__item" data-nav="journal" title="ژورنال" aria-label="ژورنال"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ items[1][2]|safe }}</svg></button>
  <button class="nav__item" data-nav="settings" title="تنظیمات" aria-label="تنظیمات"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">{{ items[2][2]|safe }}</svg></button>
</nav>
