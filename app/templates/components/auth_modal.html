<!-- مودال ورود / ثبت‌نام -->
<div class="modal" id="authModal" hidden>
  <div class="modal__backdrop" data-close></div>
  <div class="modal__box" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <button class="modal__x" type="button" data-close aria-label="بستن">&times;</button>
    <div class="auth">
      <img class="auth__logo" src="/static/img/logo.png" onerror="this.onerror=null;this.src='/static/img/logo.svg'" alt="">
      <h3 class="auth__title" id="authTitle">ورود به حساب</h3>

      <div class="auth__tabs">
        <button class="auth__tab is-active" data-tab="login" type="button">ورود</button>
        <button class="auth__tab" data-tab="register" type="button">ثبت‌نام</button>
      </div>

      <form class="auth__form" id="authForm">
        <label class="field">
          <span>ایمیل یا نام کاربری</span>
          <input type="text" name="login" autocomplete="username" required>
        </label>
        <label class="field" id="nameField" hidden>
          <span>نام نمایشی (اختیاری)</span>
          <input type="text" name="display_name" autocomplete="name">
        </label>
        <label class="field">
          <span>رمز عبور</span>
          <input type="password" name="password" autocomplete="current-password" required minlength="6">
        </label>
        <p class="auth__error" id="authError" hidden></p>
        <button class="btn btn--primary auth__submit" type="submit" id="authSubmit">ورود</button>
      </form>

      <p class="auth__hint">با ورود، شرایط استفادهٔ {{ brand_fa }} را می‌پذیرید.</p>
    </div>
  </div>
</div>
