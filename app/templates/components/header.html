<header class="header">
  <div class="header__inner">
    <!-- راست: لوگو و نام برند -->
    <a class="brand" href="/">
      <img class="brand__logo" src="/static/img/logo.png" onerror="this.onerror=null;this.src='/static/img/logo.svg'" alt="{{ brand_fa }}">
      <span class="brand__name">
        <b>{{ brand_fa }}</b>
        <span>CryptoSmart</span>
      </span>
    </a>

    <!-- وسط: عنوان پنل -->
    <div class="header__title">
      {{ title_fa }}
      <small>مدیریت هوشمند پورتفولیو</small>
    </div>

    <!-- چپ: تم + حساب کاربری -->
    <div class="header__actions">
      <button class="icon-btn theme-toggle" id="themeToggle" type="button" aria-label="تغییر تم روشن/تاریک" title="تم روشن/تاریک">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4.5"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
        </svg>
        <svg class="moon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
        </svg>
      </button>

      <button class="account-btn" id="accountBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21c0-4 3.6-6 8-6s8 2 8 6"/>
        </svg>
        <span>ورود / ثبت‌نام</span>
      </button>
    </div>
  </div>
</header>
