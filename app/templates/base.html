<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#162F55">
  <title>{% block title %}{{ brand_fa }} — {{ title_fa }}{% endblock %}</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v={{ static_v }}">
  <link rel="icon" href="/static/img/logo.png" type="image/png">

  <!-- SDK مینی‌اپ تلگرام (برای حالت وب‌اپ) — async تا رندر اولیه را کند نکند -->
  <script src="https://telegram.org/js/telegram-web-app.js" async></script>
  <!-- جلوگیری از پرش تم: قبل از رندر، تم ذخیره‌شده اعمال می‌شود -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('cs-theme');
        if (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
        document.documentElement.setAttribute('data-theme', t || 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="app">
    {% include "components/header.html" %}
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    <footer class="cs-footer">
      <div class="cs-footer__inner container">
        <div class="cs-footer__brand">
          <img src="/static/img/logo.png" alt="CryptoSmart" class="cs-footer__logo">
          <span class="cs-footer__name">کریپتو اسمارت</span>
        </div>
        <div class="cs-footer__links">
          <a href="https://t.me/CRYPTOSMART_ORG" class="cs-footer__link" target="_blank" rel="noopener noreferrer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/></svg>
            کانال تلگرام
          </a>
          <a href="https://t.me/cryptosmart_sup" class="cs-footer__link" target="_blank" rel="noopener noreferrer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            پشتیبانی
          </a>
        </div>
      </div>
    </footer>
  </div>
  {% include "components/nav.html" %}
  {% include "components/auth_modal.html" %}

  <script src="/static/js/utils.js?v={{ static_v }}"></script>
  <script src="/static/js/clock.js?v={{ static_v }}"></script>
  <script src="/static/js/theme.js?v={{ static_v }}"></script>
  <script src="/static/js/telegram.js?v={{ static_v }}"></script>
  <script src="/static/js/auth.js?v={{ static_v }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
