<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#162F55">
  <title>{% block title %}{{ brand_fa }} — {{ title_fa }}{% endblock %}</title>

  <!-- فونت فارسی (روی سرور از CDN؛ در نبود شبکه به فونت سیستم برمی‌گردد) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="icon" href="/static/img/logo.svg" type="image/svg+xml">
  <!-- اتصال SDK مینی‌اپ تلگرام (برای فاز مینی‌اپ) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- جلوگیری از پرش تم: قبل از رندر، تم ذخیره‌شده اعمال می‌شود -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('cs-theme');
        if (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
        document.documentElement.setAttribute('data-theme', t || 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="app">
    {% include "components/header.html" %}
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% include "components/nav.html" %}
  {% include "components/auth_modal.html" %}

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/clock.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/auth.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
