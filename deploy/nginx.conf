# پیکربندی Nginx برای portfolio.cryptosmart.site
# مسیر نصب: /etc/nginx/sites-available/portfolio.cryptosmart.site
# سپس: ln -s به sites-enabled و reload

server {
    listen 80;
    listen [::]:80;
    server_name portfolio.cryptosmart.site;

    # فایل‌های استاتیک مستقیم از دیسک (سریع‌تر از عبور از پایتون)
    location /static/ {
        alias /var/www/portfolio/app/static/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# پس از اجرای certbot، یک بلوک listen 443 ssl به‌صورت خودکار اضافه می‌شود
# و درخواست‌های 80 به https ریدایرکت می‌گردند.
