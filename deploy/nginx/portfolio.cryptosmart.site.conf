# پیکربندی Nginx برای portfolio.cryptosmart.site
# این فایل را در /etc/nginx/sites-available/ قرار داده و به sites-enabled لینک کنید:
#   ln -s /etc/nginx/sites-available/portfolio.cryptosmart.site.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# گواهی TLS با: certbot --nginx -d portfolio.cryptosmart.site
#
# ⚠️ این فایل فقط مربوط به portfolio است؛ به server block دو سایت دیگر کاری ندارد.

server {
    listen 80;
    listen [::]:80;
    server_name portfolio.cryptosmart.site;

    # هدایت به HTTPS (پس از صدور گواهی، certbot این بخش را مدیریت می‌کند)
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # فایل‌های استاتیک مستقیماً از دیسک (نسخه‌گذاری ?v= کش را مدیریت می‌کند)
    location /static/ {
        alias /var/www/portfolio/app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
